<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="FINMENTOR">
  <defs>
    <linearGradient id="fmGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8C766"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="fmSilver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F6F9"/>
      <stop offset="1" stop-color="#C5CBD4"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#08111F"/>
  <rect x="3" y="3" width="94" height="94" rx="21" fill="none" stroke="#C9A227" stroke-opacity="0.32" stroke-width="1.4"/>
  <!-- Monogram F: silver stem + silver mid arm + gold top arm (brand accent) -->
  <rect x="33" y="24" width="16" height="52" rx="3" fill="url(#fmSilver)"/>
  <rect x="33" y="45" width="29" height="14" rx="3" fill="url(#fmSilver)"/>
  <rect x="33" y="24" width="40" height="16" rx="3" fill="url(#fmGold)"/>
